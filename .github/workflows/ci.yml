name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,server,mcp]"

      - name: Ruff format check
        run: ruff format --check noether tests evals

      - name: Ruff lint
        run: ruff check noether tests evals

      - name: Kernel availability
        # cadabra2 is not installed on the default runner, so the cadabra
        # golden tests below skip cleanly. The sympy kernel is always present.
        run: python -m noether.cli.main kernels

      - name: Pytest
        run: pytest -q

  # NOTE: the cadabra-backed derivations (eval golden runs, eval 5 variational
  # derivation) only execute on a runner that has the cadabra2 CLI. Building it
  # from source via `brew tap kpeeters/repo && brew install cadabra2` is slow,
  # so it is intentionally not part of the default job; until a cadabra-equipped
  # job is added, those tests are exercised locally and skipped in CI. Horizon 1
  # is only fully gated once that job exists (see AGENTS.md section 6).
