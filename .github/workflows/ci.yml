name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,server,mcp]"

      - name: Ruff format check
        run: ruff format --check noether tests evals

      - name: Ruff lint
        run: ruff check noether tests evals

      - name: Kernel availability
        # cadabra2 is not installed on the default runner, so the cadabra
        # golden tests below skip cleanly. The sympy kernel is always present.
        run: python -m noether.cli.main kernels

      - name: Pytest
        run: pytest -q

  # Horizon 1 gate: the cadabra-backed golden derivations (evals 1-5) on a
  # runner with the cadabra2 CLI installed from the upstream prebuilt noble
  # package. The audited pin is 2.5.15 (noether/kernels/versions.py, local
  # Homebrew build); 2.5.14 is the newest upstream release with Ubuntu debs,
  # one patch behind. The golden tests assert computed residues, not version
  # strings, and every provenance bundle records the kernel version actually
  # used, so this job is meaningful verification rather than a silent pin bump.
  cadabra-golden:
    runs-on: ubuntu-24.04
    env:
      CADABRA_DEB_VERSION: "2.5.14"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cadabra2 (upstream prebuilt noble package)
        run: |
          curl -fsSL -o /tmp/cadabra2.deb \
            "https://github.com/kpeeters/cadabra2/releases/download/${CADABRA_DEB_VERSION}/cadabra2-${CADABRA_DEB_VERSION}-ubuntu-24.04-noble-x86_64.deb"
          sudo apt-get update
          sudo apt-get install -y /tmp/cadabra2.deb
          cadabra2 --version

      - name: Install package and dev tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Kernel availability
        run: python -m noether.cli.main kernels

      - name: Cadabra golden derivations (evals 1-5)
        run: pytest -q -m kernel_cadabra

      - name: Eval 1 end to end (cadabra-backed, with provenance)
        run: python -m noether.cli.main eval1 --results /tmp/results
